{% extends "layout.html" %}

{% block title %}Edit Study{% endblock %}

{% block body %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title mt-4">Edit Study Log</h4>

                    <form action="/edit" method="post">
                        <input name="id" type="hidden" value="{{ row.id }}">

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select  name="category" class="form-select" required>
                                <option value="Vocabulary" {% if row.category == "Vocabulary" %} selected {% endif %}>Vocabulary</option>
                                <option value="Reading" {% if row.category == "Reading" %} selected {% endif %}>Reading</option>
                                <option value="Speaking" {% if row.category == "Speaking" %} selected {% endif %}>Speaking</option>
                                <option value="Listening" {% if row.category == "Listening" %} selected {% endif %}>Listening</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Content</label>
                            <input name="content" type="text" class="form-control" value="{{ row.content }}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Minutes</label>
                            <input name="minutes" class="form-control" value="{{ row.minutes }}" type="number" min="1">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Note</label>
                            <textarea name="note" class="form-control" rows="3">{{ row.note }}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/history" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
